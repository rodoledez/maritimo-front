# Nginx vhost for maritimo-front-next (Next.js 16 behind PM2 on :3000).
#
# Install:
#   sudo cp deploy/nginx/maritimo-front.conf /etc/nginx/sites-available/maritimo-front
#   sudo ln -s /etc/nginx/sites-available/maritimo-front /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d maritimo.acostayaguayo.cl    # issue TLS cert
#   sudo nginx -t && sudo systemctl reload nginx
#
# For staging: duplicate this file, change server_name to pre-maritimo.acostayaguayo.cl,
# change upstream port if staging runs on a different PM2 instance (e.g. :3001),
# and adjust the cert paths.

upstream maritimo_front_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream maritimo_back_upstream {
    server 127.0.0.1:3300;
    keepalive 64;
}

# HTTP → HTTPS redirect (and ACME challenge passthrough for Let's Encrypt renewals)
server {
    listen 80;
    listen [::]:80;
    server_name maritimo.acostayaguayo.cl;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main vhost
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name maritimo.acostayaguayo.cl;

    # TLS — paths assume certbot. Adjust if you manage certs differently.
    ssl_certificate     /etc/letsencrypt/live/maritimo.acostayaguayo.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maritimo.acostayaguayo.cl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    access_log /var/log/nginx/maritimo-front.access.log;
    error_log  /var/log/nginx/maritimo-front.error.log;

    # Excel itinerary import is the largest upload — bump if the backend ever needs more
    client_max_body_size 25M;

    # Compression (Brotli requires the ngx_brotli module; gzip is fine for now)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # Baseline security headers. Add a CSP once the app is stable.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Backend API reverse-proxy. Browser hits /api/<path>; we strip /api/ and forward
    # to NestJS on :3300 (e.g. /api/clients → http://127.0.0.1:3300/clients).
    #
    # To use this, set NEXT_PUBLIC_API_BASE_URL=https://maritimo.acostayaguayo.cl/api
    # in the GitHub Environment vars (deploy.yml). Same-origin means no CORS, and
    # everything is behind TLS automatically.
    location /api/ {
        # Trailing slash on proxy_pass is required — it tells nginx to strip /api/
        proxy_pass http://maritimo_back_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Prefix /api;

        # Excel exports / long-running queries can take a while
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Backend can stream file downloads (Excel templates) — don't buffer
        proxy_buffering off;
    }

    # Next.js immutable build assets — long cache, content-hashed filenames
    location /_next/static/ {
        proxy_pass http://maritimo_front_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # /public assets (favicon, robots, images, fonts). Filenames here are stable
    # so cache for a week — the browser will revalidate after that.
    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|avif|svg|woff2?|ttf|eot|txt|xml)$ {
        proxy_pass http://maritimo_front_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Everything else → Next.js (RSC streams, /_next/image, /_next/data, route handlers,
    # ISR, etc.). Buffering is OFF so streamed responses (Suspense, server actions, file
    # downloads) reach the client without waiting for the full body.
    location / {
        proxy_pass http://maritimo_front_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # WebSocket upgrade — not strictly needed for `next start` in production, but
        # harmless and lets you reuse this vhost for the dev server if you ever proxy it.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Don't buffer streamed responses (RSC, server actions, file streams)
        proxy_buffering off;
    }
}
